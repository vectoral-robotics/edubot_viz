name: Release

# Automatic version bump on merge to main. After a PR is merged, commitizen
# inspects the Conventional Commits since the last tag and, if a release is
# warranted, bumps the version files + CHANGELOG and pushes a "bump: …" commit
# plus the vX.Y.Z tag back to main.
#
# The push is done with a GitHub App token so it may bypass branch protection
# on the public repos (the app is a bypass actor on the protect-main ruleset).
# That same "bump: …" commit re-triggers this workflow, so we skip it to avoid
# an infinite loop.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Auto version bump
    runs-on: ubuntu-latest
    if: >-
      github.repository_owner == 'vectoral-robotics' &&
      !startsWith(github.event.head_commit.message, 'bump:')
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git identity (release bot)
        run: |
          git config user.name  "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Bump version if warranted
        run: |
          code=0
          # --annotated-tag so `git push --follow-tags` actually publishes the
          # tag (a lightweight tag would be created but never pushed).
          uvx --from commitizen@4.16.3 cz bump --yes --annotated-tag || code=$?
          if [ "$code" -eq 21 ]; then
            echo "No eligible commits since the last tag — nothing to bump."
            exit 0
          elif [ "$code" -ne 0 ]; then
            echo "cz bump failed with exit code $code"
            exit "$code"
          fi
          git push --follow-tags origin HEAD:main
